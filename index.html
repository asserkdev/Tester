<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="L.A.I. Web Inspector - Comprehensive automated website analysis platform">
  <title>L.A.I. Web Inspector</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: #e2e8f0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero { text-align: center; padding: 4rem 0; }
    .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
    .hero p { font-size: 1.25rem; color: #94a3b8; margin-bottom: 2rem; }
    .input-group { display: flex; gap: 0.5rem; max-width: 600px; margin: 0 auto; }
    .input-group input { flex: 1; padding: 1rem 1.5rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1rem; }
    .input-group input:focus { outline: none; border-color: #3b82f6; }
    .btn { padding: 1rem 2rem; border-radius: 0.5rem; border: none; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.05); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { display: none; text-align: center; padding: 2rem; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 4rem; }
    .feature { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
    .feature h3 { margin-bottom: 0.5rem; color: #3b82f6; }
    .feature p { color: #94a3b8; }
    .dashboard { display: none; margin-top: 2rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 1rem; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #3b82f6; }
    .stat-label { color: #94a3b8; font-size: 0.875rem; }
    .issues { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 1.5rem; }
    .issue { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .issue:last-child { border-bottom: none; }
    .issue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .issue-title { font-weight: 600; }
    .severity { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .severity-high { background: #dc2626; color: white; }
    .severity-medium { background: #f59e0b; color: black; }
    .severity-low { background: #10b981; color: white; }
    .issue-description { color: #94a3b8; font-size: 0.875rem; }
    .back-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 1rem; }
    @media (max-width: 640px) { .hero h1 { font-size: 2rem; } .input-group { flex-direction: column; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [url, setUrl] = useState('');
      const [loading, setLoading] = useState(false);
      const [scanId, setScanId] = useState(null);
      const [results, setResults] = useState(null);

      const analyzeWebsite = async () => {
        if (!url) return;
        setLoading(true);
        try {
          const response = await fetch('https://lai-api.asser-k.workers.dev/api/v1/scans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
          });
          const data = await response.json();
          if (data.success) {
            setScanId(data.data.id);
            pollResults(data.data.id);
          }
        } catch (err) {
          alert('Error: ' + err.message);
          setLoading(false);
        }
      };

      const pollResults = async (id) => {
        const poll = async () => {
          try {
            const response = await fetch(`https://lai-api.asser-k.workers.dev/api/v1/scans/${id}`);
            const data = await response.json();
            if (data.success && data.data.status === 'completed') {
              setResults(data.data);
              setLoading(false);
            } else if (data.data?.status === 'failed') {
              alert('Scan failed');
              setLoading(false);
            } else {
              setTimeout(poll, 2000);
            }
          } catch (err) {
            setTimeout(poll, 2000);
          }
        };
        poll();
      };

      if (loading) {
        return (
          <div className="container">
            <div className="loading" style={{display: 'block'}}>
              <div className="spinner"></div>
              <p>Scanning website... This may take a few moments.</p>
              {scanId && <p style={{marginTop: '1rem', color: '#94a3b8'}}>Scan ID: {scanId}</p>}
            </div>
          </div>
        );
      }

      if (results) {
        return (
          <div className="container">
            <button className="btn back-btn" onClick={() => { setResults(null); setUrl(''); }}>← New Scan</button>
            <h2 style={{marginBottom: '1rem'}}>Scan Results for {results.url}</h2>
            <div className="stats">
              <div className="stat"><div className="stat-value">{results.score || 0}</div><div className="stat-label">Score</div></div>
              <div className="stat"><div className="stat-value">{results.issueCount || 0}</div><div className="stat-label">Issues</div></div>
              <div className="stat"><div className="stat-value">{(results.duration || 0) / 1000}s</div><div className="stat-label">Duration</div></div>
            </div>
            <div className="issues">
              {results.issues?.map((issue, i) => (
                <div key={i} className="issue">
                  <div className="issue-header">
                    <span className="issue-title">{issue.title}</span>
                    <span className={`severity severity-${issue.severity}`}>{issue.severity}</span>
                  </div>
                  <p className="issue-description">{issue.description}</p>
                </div>
              )) || <p>No issues found!</p>}
            </div>
          </div>
        );
      }

      return (
        <div className="container">
          <header className="header">
            <div className="logo">L.A.I. Web Inspector</div>
            <span style={{color: '#94a3b8'}}>Dashboard</span>
          </header>
          <div className="hero">
            <h1>Analyze Your Website</h1>
            <p>Comprehensive automated analysis for bugs, security issues, performance problems, and more.</p>
            <div className="input-group">
              <input type="url" placeholder="https://example.com" value={url} onChange={e => setUrl(e.target.value)} onKeyPress={e => e.key === 'Enter' && analyzeWebsite()} />
              <button className="btn" onClick={analyzeWebsite}>Analyze</button>
            </div>
          </div>
          <div className="features">
            <div className="feature">
              <h3>🔒 Security Analysis</h3>
              <p>Detect vulnerabilities and check security headers.</p>
            </div>
            <div className="feature">
              <h3>⚡ Performance</h3>
              <p>Core Web Vitals and loading optimization insights.</p>
            </div>
            <div className="feature">
              <h3>♿ Accessibility</h3>
              <p>WCAG compliance checks and keyboard navigation.</p>
            </div>
            <div className="feature">
              <h3>🔍 SEO</h3>
              <p>Meta tags, Open Graph, and search engine optimization.</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
